<!DOCTYPE html>
<html lang="pt-BR"> <!-- Dizendo ao navegador o idioma predominante do HTML, mas contendo palavras em outros idiomas. Como por ex: "Skills" e "Download" em inglês. -->
<head>
    <meta charset="UTF-8"> <!-- É opcional, mas é adequado para segurança e conversões antigas de navegadores -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 maismaniac Developer</title> <!-- Título que aparece na aba do navegador -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Press+Start+2P&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/components/header.css">
    <link rel="stylesheet" href="css/components/banner.css">
    <link rel="stylesheet" href="css/components/section.css">
    <link rel="stylesheet" href="css/components/button.css">
    <link rel="stylesheet" href="css/components/main-title.css">
    <link rel="stylesheet" href="css/components/subtitle.css">
    <link rel="stylesheet" href="css/components/box.css">
    <link rel="stylesheet" href="css/components/action.css">
    <link rel="stylesheet" href="css/components/wrapper-skills.css">
    <link rel="stylesheet" href="css/components/tech-skills.css">
    <link rel="stylesheet" href="css/components/progress-bar.css">
    <link rel="stylesheet" href="css/components/card-project.css">
</head>

<body>
    
    <header class="header"> <!-- Cabeçalho -->
        <img src="assets/img/logo.png" alt="Logo maismaniac"> <!-- Imagem da logo -->

        <nav> <!-- Navegação do site e "botões" com links de navegação -->
            <a class="action" href="" lang="en">Skills</a>
            <a class="action" href="" >Projetos</a>
            <a class="action" href="" >Sobre</a>
            <a class="action" href="" >Contato</a>
            <a class="button" href="" lang="en">Download CV</a>
        </nav>
    </header>
    
    <section class="banner">
        <div class="wrapper">
            <div class="box">
                <h2 class="main-title">maismaniac</h1> <!-- heading 1 -->
                <h3 class="subtitle">Full Stack Developer</h2>
            </div>
            
            <div class="navigation">
                <a class="button" href="" lang="en">Download CV</a>
                <a class="button" href="">Contatos</a>
            </div>
        </div>
    </section>
    
    <section class="section">
        <h2 class="main-title -second" lang="en">Skills</h2>

        <div class="wrapper-skills">
            <article class="tech-skills"> <!-- Description List -->
                <img class="icon" src="img/ico_html5.png" all="Logo HTML5 Pixel Art">
                <div class="right">
                    <h3 class="title">HTML</h3>
                    <progress class="progress-bar" max="100" value="70">
                        70%
                    </progress>
                </div>
            </article>
            <article class="tech-skills">
                <img class="icon" src="img/ico_nodejs.png" all="Logo NodeJS Pixel Art">
                <div class="right">
                    <h3 class="title">NodeJS</h3>
                    <progress class="progress-bar" max="100" value="70">
                        70%
                    </progress>
                </div>
            </article>
            <article class="tech-skills">
                <img class="icon" src="img/ico_css3.png" all="Logo CSS3 Pixel Art">
                <div class="right">
                    <h3 class="title">CSS</h3>
                    <progress class="progress-bar" max="100" value="70">
                        70%
                    </progress>
                </div>
            </article>
            <article class="tech-skills">
                <img class="icon" src="img/ico_tdd.png" all="Logo TDD Pixel Art">
                <div class="right">
                    <h3 class="title">TDD</h3>
                    <progress class="progress-bar" max="100" value="70">
                        70%
                    </progress>
                </div>
            </article>
            <article class="tech-skills">
                <img class="icon" src="img/ico_js.png" all="Logo JavaScript Pixel Art">
                <div class="right">
                    <h3 class="title">JavaScript</h3>
                    <progress class="progress-bar" max="100" value="70">
                        70%
                    </progress>
                </div>
            </article>
            <article class="tech-skills">
                <img class="icon" src="img/ico_restapi.png" all="Logo RestAPI Pixel Art">
                <div class="right">
                    <h3 class="title">Rest API</h3>
                    <progress class="progress-bar" max="100" value="70">
                        70%
                    </progress>
                </div>
            </article>
            <article class="tech-skills">
                <img class="icon" src="img/ico_react.png" all="Logo React Pixel Art">
                <div class="right">
                    <h3 class="title">React</h3>
                    <progress class="progress-bar" max="100" value="70">
                        70%
                    </progress>
                </div>
            </article>
            <article class="tech-skills">
                <img class="icon" src="img/ico_ux.png" all="Logo UX Pixel Art">
                <div class="right">
                    <h3 class="title">UX</h3>
                    <progress class="progress-bar" max="100" value="70">
                        70%
                    </progress>
                </div>
            </article>
        </div>
    </section>

    <section class="section">
        <h2 class="main-title -second">Projetos</h2>
        
        <figure class="card-project">
            <img class="logo" src="img/firedlabs.png" alt="Logo da FiredLabs">
        </figure>
        <figure class="card-project -black">
            <img class="logo" src="img/collabcode.png" alt="Logo da CollabCode">
        </figure>
        <figure class="card-project">
            <img class="logo" src="img/portfolio.jpeg" alt="Avatar maismaniac">
        </figure>
    </section>
</body>
</html>
